services:
  postgres:
    image: postgres:16-alpine
    container_name: plateforme-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: plateforme
      POSTGRES_PASSWORD: plateforme_dev
      POSTGRES_DB: plateforme
    ports:
      - "5432:5432"
    volumes:
      - plateforme_pgdata:/var/lib/postgresql/data

volumes:
  plateforme_pgdata:
